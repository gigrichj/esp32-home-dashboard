; ESP32-S3-Touch-LCD-7 (Waveshare) — Home Dashboard
; https://docs.waveshare.com/ESP32-S3-Touch-LCD-7

[env:esp32-s3-touch-lcd-7]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; --- Memory / PSRAM (board has 8MB PSRAM, 16MB Flash) ---
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

build_unflags =
    -std=gnu++11

build_flags =
    -std=gnu++17
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=1
    -Iinclude

monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder, colorize
monitor_rts = 0
monitor_dtr = 0

lib_deps =
    bblanchon/ArduinoJson@^7.0.4
    knolleary/PubSubClient@^2.8
    https://github.com/Hopperpop/Sgp4-Library.git
    bitbank2/JPEGDEC@^1.8.4
