; ESP32-S3-Touch-LCD-7 (Waveshare) — Home Dashboard
; https://docs.waveshare.com/ESP32-S3-Touch-LCD-7

[env:esp32-s3-touch-lcd-7]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- Memory / PSRAM (board has 8MB PSRAM, 16MB Flash) ---
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=1
    -DLV_CONF_INCLUDE_SIMPLE
    -Iinclude

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    lvgl/lvgl@^8.3.11
    bblanchon/ArduinoJson@^7.0.4
    knolleary/PubSubClient@^2.8
    esp-arduino-libs/ESP32_Display_Panel@^0.1.4
    esp-arduino-libs/ESP32_IO_Expander@^0.0.3
