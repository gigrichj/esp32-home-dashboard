name: PlatformIO Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache secrets.h stand-in
        run: cp include/secrets.h.example include/secrets.h
        # CI has no real API keys — this just satisfies the #include so
        # the build can verify compilation, not live behavior.

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            .pio/build/esp32-s3-touch-lcd-7/firmware.bin
            .pio/build/esp32-s3-touch-lcd-7/firmware.elf
            .pio/build/esp32-s3-touch-lcd-7/bootloader.bin
            .pio/build/esp32-s3-touch-lcd-7/partitions.bin
          if-no-files-found: warn
