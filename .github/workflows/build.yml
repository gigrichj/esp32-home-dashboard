name: PlatformIO Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate secrets.h from repository secrets
        env:
          WIFI_SSID: ${{ secrets.WIFI_SSID }}
          WIFI_PASSWORD: ${{ secrets.WIFI_PASSWORD }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          HOME_LAT: ${{ secrets.HOME_LAT }}
          HOME_LON: ${{ secrets.HOME_LON }}
          ADSBX_API_KEY: ${{ secrets.ADSBX_API_KEY }}
          N2YO_API_KEY: ${{ secrets.N2YO_API_KEY }}
          HUBITAT_HUB_IP: ${{ secrets.HUBITAT_HUB_IP }}
          HUBITAT_APP_ID: ${{ secrets.HUBITAT_APP_ID }}
          HUBITAT_ACCESS_TOKEN: ${{ secrets.HUBITAT_ACCESS_TOKEN }}
          HA_BASE_URL: ${{ secrets.HA_BASE_URL }}
          HA_LONG_LIVED_TOKEN: ${{ secrets.HA_LONG_LIVED_TOKEN }}
          MQTT_BROKER: ${{ secrets.MQTT_BROKER }}
          MQTT_PORT: ${{ secrets.MQTT_PORT }}
          MQTT_USER: ${{ secrets.MQTT_USER }}
          MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
          OPENSKY_CLIENT_ID: ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
        run: |
          cat > include/secrets.h << EOF
          #pragma once
          #define WIFI_SSID "${WIFI_SSID}"
          #define WIFI_PASSWORD "${WIFI_PASSWORD}"
          #define OWM_API_KEY "${OWM_API_KEY}"
          #define HOME_LAT ${HOME_LAT:-38.6871}
          #define HOME_LON ${HOME_LON:--77.2624}
          #define ADSBX_API_KEY "${ADSBX_API_KEY}"
          #define FLIGHTAWARE_API_KEY ""
          #define FAVORITE_AIRPORTS {"KIAD", "KDCA"}
          #define N2YO_API_KEY "${N2YO_API_KEY}"
          #define HUBITAT_HUB_IP "${HUBITAT_HUB_IP:-192.168.1.1}"
          #define HUBITAT_APP_ID "${HUBITAT_APP_ID:-1}"
          #define HUBITAT_ACCESS_TOKEN "${HUBITAT_ACCESS_TOKEN}"
          #define HA_BASE_URL "${HA_BASE_URL:-http://homeassistant.local:8123}"
          #define HA_LONG_LIVED_TOKEN "${HA_LONG_LIVED_TOKEN}"
          #define MQTT_BROKER "${MQTT_BROKER:-192.168.1.1}"
          #define MQTT_PORT ${MQTT_PORT:-1883}
          #define MQTT_USER "${MQTT_USER}"
          #define MQTT_PASSWORD "${MQTT_PASSWORD}"
          #define OPENSKY_CLIENT_ID "${OPENSKY_CLIENT_ID}"
          #define OPENSKY_CLIENT_SECRET "${OPENSKY_CLIENT_SECRET}"
          EOF

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            .pio/build/esp32-s3-touch-lcd-7/firmware.bin
            .pio/build/esp32-s3-touch-lcd-7/firmware.elf
            .pio/build/esp32-s3-touch-lcd-7/bootloader.bin
            .pio/build/esp32-s3-touch-lcd-7/partitions.bin
          if-no-files-found: warn
