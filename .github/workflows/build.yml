name: PlatformIO Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache secrets.h stand-in
        run: cp include/secrets.h.example include/secrets.h
        # CI has no real API keys — this just satisfies the #include so
        # the build can verify compilation, not live behavior.

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run
